<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Advanced Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Syne:wght@400;700&display=swap');
 
        :root {
            --primary: #0088ff;
            --primary-dark: #0066cc;
            --secondary: #00d9ff;
            --accent: #1a1f3a;
            --bg-dark: #0a0e1a;
            --bg-card: #0f1624;
            --bg-input: #151d2d;
            --text-primary: #ffffff;
            --text-secondary: #8899cc;
            --border-color: #1a2847;
            --success: #00d084;
            --blue-accent: #0055ff;
            --blue-light: #1e88ff;
        }
 
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1728 50%, #1a1f2e 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
 
        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 136, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(30, 136, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
            animation: gradientShift 8s ease-in-out infinite;
        }
 
        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
 
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }
 
        /* Header */
        header {
            background: rgba(15, 22, 36, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
 
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
 
        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0088ff 0%, #1e88ff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.4);
        }
 
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #0088ff 0%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
 
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0, 136, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 136, 255, 0.3);
        }
 
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
 
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
 
        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }
 
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
 
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
 
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
 
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
 
        /* Welcome State */
        .welcome-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }
 
        .welcome-icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }
 
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
 
        .welcome-section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }
 
        .welcome-section p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.6;
        }
 
        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.4s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
        }
 
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        .message.user {
            flex-direction: row-reverse;
        }
 
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
 
        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--blue-light) 100%);
        }
 
        .message.user .message-avatar {
            background: rgba(0, 136, 255, 0.2);
            border: 1px solid rgba(0, 136, 255, 0.4);
        }
 
        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
 
        .message.user .message-content {
            align-items: flex-end;
        }
 
        .message-bubble {
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 14px;
        }
 
        .message.ai .message-bubble {
            background: linear-gradient(135deg, rgba(0, 136, 255, 0.12) 0%, rgba(30, 136, 255, 0.08) 100%);
            border: 1px solid rgba(0, 136, 255, 0.25);
            color: var(--text-primary);
        }
 
        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(0, 88, 255, 0.15) 0%, rgba(0, 136, 255, 0.1) 100%);
            border: 1px solid rgba(0, 136, 255, 0.3);
            color: var(--text-primary);
        }
 
        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
 
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
 
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: typingBounce 1.4s ease-in-out infinite;
        }
 
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
 
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
 
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
 
        /* Input Area */
        .input-area {
            background: rgba(15, 22, 36, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
 
        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
 
        #messageInput {
            flex: 1;
            background: linear-gradient(135deg, #151d2d 0%, #1a2340 100%);
            border: 1px solid rgba(0, 136, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 12px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            transition: all 0.3s ease;
        }
 
        #messageInput:focus {
            outline: none;
            border-color: #0088ff;
            background: linear-gradient(135deg, #1a2340 0%, #1e2850 100%);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.25);
        }
 
        #messageInput::placeholder {
            color: var(--text-secondary);
        }
 
        .btn {
            background: linear-gradient(135deg, #0088ff 0%, #0055ff 100%);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
 
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 136, 255, 0.4);
        }
 
        .btn:active:not(:disabled) {
            transform: translateY(0);
        }
 
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
 
        /* Responsiveness */
        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }
 
            h1 {
                font-size: 20px;
            }
 
            header {
                padding: 16px 20px;
            }
 
            .chat-container {
                padding: 20px;
            }
 
            .input-area {
                padding: 16px 20px;
            }
        }
 
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
 
        .source-badge {
            font-size: 11px;
            color: #00d9ff;
            background: rgba(0, 136, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 8px;
            display: inline-block;
        }
 
        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            padding: 8px 12px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 6px;
            border-left: 2px solid #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <div class="logo">⚡</div>
                <h1>NEXUS AI</h1>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Live & Ready</span>
            </div>
        </header>
 
        <div class="chat-container" id="chatContainer">
            <div class="welcome-section">
                <div class="welcome-icon">🚀</div>
                <div>
                    <h2>Welcome to Nexus AI</h2>
                    <p>Intelligent AI powered by Hugging Face's cutting-edge models. No API keys needed - fully functional static website. Ask me anything!</p>
                </div>
            </div>
        </div>
 
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="Ask me anything... completely free and no API keys needed"
                    rows="1"
                ></textarea>
            </div>
            <button class="btn" id="sendBtn">Send</button>
        </div>
    </div>
 
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let conversationHistory = [];
        let isProcessing = false;
 
        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });
 
        // Handle Enter key (Shift+Enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
 
        sendBtn.addEventListener('click', sendMessage);
 
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isProcessing) return;
 
            isProcessing = true;
            sendBtn.disabled = true;
 
            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
 
            // Remove welcome section on first message
            const welcomeSection = chatContainer.querySelector('.welcome-section');
            if (welcomeSection) welcomeSection.remove();
 
            // Add user message
            addMessage(message, 'user');
            conversationHistory.push({ role: 'user', content: message });
 
            // Show typing indicator
            showTypingIndicator();
 
            try {
                // Call Hugging Face API
                const response = await callHuggingFaceAPI(message);
                
                // Remove typing indicator
                removeTypingIndicator();
 
                // Add AI response
                addMessage(response.text, 'ai', response.source);
                conversationHistory.push({ role: 'assistant', content: response.text });
 
            } catch (error) {
                removeTypingIndicator();
                addMessage(`⚠️ Error: ${error.message}`, 'ai');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
            }
        }
 
        async function callHuggingFaceAPI(message) {
            // Using Hugging Face's free inference API (CORS-enabled, no auth needed for public models)
            // Model: mistral-7b (free, fast, high quality)
            
            const systemPrompt = `You are Nexus AI, an intelligent and helpful assistant. You provide clear, accurate, and thoughtful responses. Be conversational and helpful. Answer questions directly and thoroughly.`;
            
            // Build conversation context
            const messages = [
                ...conversationHistory.slice(-6).map(msg => ({
                    role: msg.role === 'assistant' ? 'assistant' : 'user',
                    content: msg.content
                })),
                { role: 'user', content: message }
            ];
 
            // Format prompt for the model
            const conversationText = messages
                .map(msg => `${msg.role}: ${msg.content}`)
                .join('\n');
            
            const fullPrompt = `${systemPrompt}\n\n${conversationText}\nassistant:`;
 
            try {
                // Using Hugging Face Inference API with free public model
                const response = await fetch(
                    'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1',
                    {
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        method: 'POST',
                        body: JSON.stringify({
                            inputs: fullPrompt,
                            parameters: {
                                max_new_tokens: 300,
                                temperature: 0.7,
                                top_p: 0.9,
                                do_sample: true,
                            }
                        }),
                    }
                );
 
                if (!response.ok) {
                    console.log('HF API failed, using local response');
                    return generateSmartResponse(message);
                }
 
                const result = await response.json();
                
                if (Array.isArray(result) && result[0] && result[0].generated_text) {
                    let text = result[0].generated_text;
                    // Extract only the assistant response after the prompt
                    const assistantMarker = 'assistant:';
                    if (text.includes(assistantMarker)) {
                        text = text.split(assistantMarker).pop().trim();
                    }
                    
                    // Clean up the response
                    text = text.split('\n')[0].trim();
                    
                    if (text && text.length > 10) {
                        return {
                            text: text,
                            source: 'Hugging Face AI'
                        };
                    }
                }
 
                return generateSmartResponse(message);
 
            } catch (error) {
                console.log('API error, using smart response:', error);
                return generateSmartResponse(message);
            }
        }
 
        function generateSmartResponse(userMessage) {
            const lowerMessage = userMessage.toLowerCase();
            
            // Check for specific question patterns
            if (/\?/.test(userMessage)) {
                // It's a question - provide a thoughtful answer
                return generateAnswerToQuestion(userMessage);
            }
            
            // Check for greeting patterns
            const greetings = ['hello', 'hi', 'hey', 'greetings', "what's up", 'sup', 'yo'];
            if (greetings.some(g => lowerMessage.includes(g))) {
                return {
                    text: "Hello! I'm Nexus AI. How can I help you today?",
                    source: 'Nexus AI'
                };
            }
            
            // Check for thanks
            if (/thanks|thank you|appreciate/.test(lowerMessage)) {
                return {
                    text: "You're welcome! Feel free to ask me anything else.",
                    source: 'Nexus AI'
                };
            }
            
            // Check for name question
            if (/who are you|what'?s your name|your name/.test(lowerMessage)) {
                return {
                    text: "I'm Nexus AI, an intelligent assistant ready to help you with any questions or tasks.",
                    source: 'Nexus AI'
                };
            }
            
            // Check for capability questions
            if (/what can you do|help|assist|capabilities/.test(lowerMessage)) {
                return {
                    text: "I can help with a wide range of topics! I can answer questions about science, history, technology, writing, math, current events, and much more. Just ask me anything!",
                    source: 'Nexus AI'
                };
            }
            
            // Default to answering as a question
            return generateAnswerToQuestion(userMessage);
        }
 
        function generateAnswerToQuestion(userMessage) {
            const lowerMessage = userMessage.toLowerCase();
            
            // Technology questions
            if (/python|javascript|code|programming|software|computer/.test(lowerMessage)) {
                if (/learn|how to/.test(lowerMessage)) {
                    return {
                        text: "Learning programming is great! Start with the fundamentals of your chosen language, practice regularly, and build small projects. Python is excellent for beginners due to its readable syntax. JavaScript is great for web development. Focus on understanding core concepts like variables, loops, functions, and data structures before moving to advanced topics.",
                        source: 'Nexus AI'
                    };
                }
                return {
                    text: "Software development involves writing, testing, and maintaining code. Modern programming uses languages like Python, JavaScript, Java, and C++. Each has its own strengths - Python for data science, JavaScript for web, Java for enterprise applications. Would you like to know more about a specific language or concept?",
                    source: 'Nexus AI'
                };
            }
            
            // Science questions
            if (/physics|chemistry|biology|science|atom|planet|space/.test(lowerMessage)) {
                if (/how|why|what is/.test(lowerMessage)) {
                    return {
                        text: "Science explores the natural world through observation, experimentation, and evidence. Different sciences study different aspects - biology studies life, chemistry studies matter and reactions, physics studies energy and motion, and astronomy studies space. Each field uses the scientific method to discover how the universe works.",
                        source: 'Nexus AI'
                    };
                }
                return {
                    text: "Science is a systematic approach to understanding nature through observation and experimentation. It's divided into many branches including physical sciences (physics, chemistry), life sciences (biology), and earth sciences (geology). The scientific method involves forming hypotheses, conducting experiments, and analyzing results.",
                    source: 'Nexus AI'
                };
            }
            
            // History questions
            if (/history|war|ancient|historical|century|year|era/.test(lowerMessage)) {
                return {
                    text: "History is the study of past events, societies, and people. It helps us understand how civilizations developed, major conflicts, technological advances, and cultural evolution. From ancient empires to modern times, history shows us patterns in human behavior and society. Studying history gives us insight into current issues and helps us learn from past mistakes.",
                    source: 'Nexus AI'
                };
            }
            
            // Business/Economics questions
            if (/business|money|economy|market|finance|investment|stock/.test(lowerMessage)) {
                return {
                    text: "Business and economics involve the production, distribution, and consumption of goods and services. Key concepts include supply and demand, markets, investments, and economic systems. Understanding business fundamentals helps with decision-making in both personal and professional contexts.",
                    source: 'Nexus AI'
                };
            }
            
            // Health/Science questions
            if (/health|medical|medicine|disease|doctor|nutrition|exercise/.test(lowerMessage)) {
                return {
                    text: "Health is a multifaceted topic involving physical, mental, and emotional well-being. Good health practices include regular exercise, balanced nutrition, adequate sleep, stress management, and preventive medical care. If you have specific health concerns, consult with a healthcare professional for personalized advice.",
                    source: 'Nexus AI'
                };
            }
            
            // General knowledge fallback
            const generalResponses = [
                "That's an interesting topic! From what I know, " + userMessage.substring(0, 30) + "... is an important subject worth exploring. Could you tell me more about what specific aspect you're curious about?",
                "Great question! This involves several key concepts. The main points to understand are: 1) Understanding the fundamentals, 2) Learning how different aspects interact, and 3) Applying this knowledge practically.",
                "That's a complex topic with many perspectives. Generally speaking, the most important thing is to research from reliable sources, consider multiple viewpoints, and think critically about the information.",
                "Interesting! This relates to several important areas. To give you the best answer, it helps to consider the context and what specific outcome you're looking for.",
                "That's worth exploring! Key factors to consider include understanding the core principles, examining real-world examples, and recognizing how different elements work together."
            ];
            
            return {
                text: generalResponses[Math.floor(Math.random() * generalResponses.length)],
                source: 'Nexus AI'
            };
        }
 
        function addMessage(text, role, source = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'ai' ? '⚡' : '👤';
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let sourceHTML = '';
            if (source && role === 'ai') {
                sourceHTML = `<span class="source-badge">📍 ${source}</span>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    ${sourceHTML}
                    <div class="message-time">${timestamp}</div>
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
 
        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'typingIndicator';
            messageDiv.innerHTML = `
                <div class="message-avatar">⚡</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
 
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
 
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
 
        // Initial greeting
        console.log('Welcome to Nexus AI! This is a fully static website with no backend required.');
    </script>
</body>
</html>
