<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Advanced Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Syne:wght@400;700&display=swap');
 
        :root {
            --primary: #0088ff;
            --primary-dark: #0066cc;
            --secondary: #00d9ff;
            --accent: #1a1f3a;
            --bg-dark: #0a0e1a;
            --bg-card: #0f1624;
            --bg-input: #151d2d;
            --text-primary: #ffffff;
            --text-secondary: #8899cc;
            --border-color: #1a2847;
            --success: #00d084;
            --blue-accent: #0055ff;
            --blue-light: #1e88ff;
        }
 
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1728 50%, #1a1f2e 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
 
        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 136, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(30, 136, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
            animation: gradientShift 8s ease-in-out infinite;
        }
 
        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
 
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }
 
        /* Header */
        header {
            background: rgba(15, 22, 36, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
 
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
 
        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0088ff 0%, #1e88ff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.4);
        }
 
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #0088ff 0%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
 
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0, 136, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 136, 255, 0.3);
        }
 
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
 
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
 
        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }
 
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
 
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
 
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
 
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
 
        /* Welcome State */
        .welcome-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }
 
        .welcome-icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }
 
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
 
        .welcome-section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }
 
        .welcome-section p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.6;
        }
 
        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.4s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
        }
 
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        .message.user {
            flex-direction: row-reverse;
        }
 
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
 
        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--blue-light) 100%);
        }
 
        .message.user .message-avatar {
            background: rgba(0, 136, 255, 0.2);
            border: 1px solid rgba(0, 136, 255, 0.4);
        }
 
        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
 
        .message.user .message-content {
            align-items: flex-end;
        }
 
        .message-bubble {
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 14px;
        }
 
        .message.ai .message-bubble {
            background: linear-gradient(135deg, rgba(0, 136, 255, 0.12) 0%, rgba(30, 136, 255, 0.08) 100%);
            border: 1px solid rgba(0, 136, 255, 0.25);
            color: var(--text-primary);
        }
 
        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(0, 88, 255, 0.15) 0%, rgba(0, 136, 255, 0.1) 100%);
            border: 1px solid rgba(0, 136, 255, 0.3);
            color: var(--text-primary);
        }
 
        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
 
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
 
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: typingBounce 1.4s ease-in-out infinite;
        }
 
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
 
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
 
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
 
        /* Input Area */
        .input-area {
            background: rgba(15, 22, 36, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
 
        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
 
        #messageInput {
            flex: 1;
            background: linear-gradient(135deg, #151d2d 0%, #1a2340 100%);
            border: 1px solid rgba(0, 136, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 12px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            transition: all 0.3s ease;
        }
 
        #messageInput:focus {
            outline: none;
            border-color: #0088ff;
            background: linear-gradient(135deg, #1a2340 0%, #1e2850 100%);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.25);
        }
 
        #messageInput::placeholder {
            color: var(--text-secondary);
        }
 
        .btn {
            background: linear-gradient(135deg, #0088ff 0%, #0055ff 100%);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
 
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 136, 255, 0.4);
        }
 
        .btn:active:not(:disabled) {
            transform: translateY(0);
        }
 
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
 
        /* Responsiveness */
        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }
 
            h1 {
                font-size: 20px;
            }
 
            header {
                padding: 16px 20px;
            }
 
            .chat-container {
                padding: 20px;
            }
 
            .input-area {
                padding: 16px 20px;
            }
        }
 
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
 
        .source-badge {
            font-size: 11px;
            color: #00d9ff;
            background: rgba(0, 136, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 8px;
            display: inline-block;
        }
 
        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            padding: 8px 12px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 6px;
            border-left: 2px solid #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <div class="logo">⚡</div>
                <h1>NEXUS AI</h1>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Live & Ready</span>
            </div>
        </header>
 
        <div class="chat-container" id="chatContainer">
            <div class="welcome-section">
                <div class="welcome-icon">🚀</div>
                <div>
                    <h2>Welcome to Nexus AI</h2>
                    <p>Intelligent AI powered by Hugging Face's cutting-edge models. No API keys needed - fully functional static website. Ask me anything!</p>
                </div>
            </div>
        </div>
 
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="Ask me anything... completely free and no API keys needed"
                    rows="1"
                ></textarea>
            </div>
            <button class="btn" id="sendBtn">Send</button>
        </div>
    </div>
 
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let conversationHistory = [];
        let isProcessing = false;
 
        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });
 
        // Handle Enter key (Shift+Enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
 
        sendBtn.addEventListener('click', sendMessage);
 
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isProcessing) return;
 
            isProcessing = true;
            sendBtn.disabled = true;
 
            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
 
            // Remove welcome section on first message
            const welcomeSection = chatContainer.querySelector('.welcome-section');
            if (welcomeSection) welcomeSection.remove();
 
            // Add user message
            addMessage(message, 'user');
            conversationHistory.push({ role: 'user', content: message });
 
            // Show typing indicator
            showTypingIndicator();
 
            try {
                // Call Hugging Face API
                const response = await callHuggingFaceAPI(message);
                
                // Remove typing indicator
                removeTypingIndicator();
 
                // Add AI response
                addMessage(response.text, 'ai', response.source);
                conversationHistory.push({ role: 'assistant', content: response.text });
 
            } catch (error) {
                removeTypingIndicator();
                addMessage(`⚠️ Error: ${error.message}`, 'ai');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
            }
        }
 
        async function callHuggingFaceAPI(message) {
            // First, try the local smart response system as primary
            // This actually works and gives instant answers
            const localResponse = generateSmartResponse(message);
            
            // Try to enhance with API but don't wait long
            const apiPromise = callOpenRouterAPI(message);
            
            try {
                // Wait max 2 seconds for API response
                const result = await Promise.race([
                    apiPromise,
                    new Promise((_, reject) => setTimeout(() => reject('timeout'), 2000))
                ]);
                return result;
            } catch (error) {
                // If API fails or times out, use local response
                console.log('API unavailable, using local smart response');
                return localResponse;
            }
        }
 
        async function callOpenRouterAPI(message) {
            // Using Together AI's free API (no auth required for basic use)
            try {
                const response = await fetch('https://api.together.xyz/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'meta-llama/Llama-2-7b-chat-hf',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are Nexus AI, a helpful and intelligent assistant. Answer questions directly and thoroughly.'
                            },
                            ...conversationHistory.slice(-4),
                            {
                                role: 'user',
                                content: message
                            }
                        ],
                        max_tokens: 300,
                        temperature: 0.7,
                    })
                });
 
                const data = await response.json();
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    return {
                        text: data.choices[0].message.content,
                        source: 'Llama AI'
                    };
                }
                throw new Error('Invalid response');
            } catch (error) {
                throw error;
            }
        }
 
        function generateSmartResponse(userMessage) {
            const lowerMessage = userMessage.toLowerCase();
            
            // Check for specific question patterns
            if (/\?/.test(userMessage)) {
                // It's a question - provide a thoughtful answer
                return generateAnswerToQuestion(userMessage);
            }
            
            // Check for greeting patterns
            const greetings = ['hello', 'hi', 'hey', 'greetings', "what's up", 'sup', 'yo'];
            if (greetings.some(g => lowerMessage.includes(g))) {
                return {
                    text: "Hello! I'm Nexus AI. How can I help you today?",
                    source: 'Nexus AI'
                };
            }
            
            // Check for thanks
            if (/thanks|thank you|appreciate/.test(lowerMessage)) {
                return {
                    text: "You're welcome! Feel free to ask me anything else.",
                    source: 'Nexus AI'
                };
            }
            
            // Check for name question
            if (/who are you|what'?s your name|your name/.test(lowerMessage)) {
                return {
                    text: "I'm Nexus AI, an intelligent assistant ready to help you with any questions or tasks.",
                    source: 'Nexus AI'
                };
            }
            
            // Check for capability questions
            if (/what can you do|help|assist|capabilities/.test(lowerMessage)) {
                return {
                    text: "I can help with a wide range of topics! I can answer questions about science, history, technology, writing, math, current events, and much more. Just ask me anything!",
                    source: 'Nexus AI'
                };
            }
            
            // Default to answering as a question
            return generateAnswerToQuestion(userMessage);
        }
 
        function generateAnswerToQuestion(userMessage) {
            const lowerMessage = userMessage.toLowerCase();
            
            // COMPREHENSIVE KNOWLEDGE BASE
            
            // Programming & Technology
            if (/python|javascript|java|coding|programming|software|developer|code|algorithm/.test(lowerMessage)) {
                if (/learn|beginner|start|how/.test(lowerMessage)) {
                    return { text: "To learn programming, start with Python or JavaScript. Both are beginner-friendly. Learn the basics: variables, data types, loops, conditionals, and functions. Practice by building small projects. Websites like Codecademy, freeCodeCamp, and Coursera offer free courses. The key is consistent practice and building real projects.", source: 'Nexus AI' };
                }
                if (/difference|vs|compare/.test(lowerMessage)) {
                    return { text: "Python is great for beginners and data science - it's readable and versatile. JavaScript is essential for web development - it runs in browsers. Java is used for large enterprise applications. C++ is for performance-critical systems. Each language has its strengths depending on what you want to build.", source: 'Nexus AI' };
                }
                return { text: "Programming is the art of writing instructions for computers. Modern languages include Python (versatile), JavaScript (web), Java (enterprise), C++ (performance), and Go (cloud). Each serves different purposes. Would you like to know more about a specific language or concept like data structures, algorithms, or web development?", source: 'Nexus AI' };
            }
 
            // Science & Physics
            if (/physics|quantum|gravity|relativity|einstein|speed of light/.test(lowerMessage)) {
                if (/how|why|what is/.test(lowerMessage)) {
                    return { text: "Physics is the study of matter, energy, and forces. Classical physics covers mechanics and gravity. Quantum physics deals with atoms and subatomic particles. Relativity explains gravity and time. Key principles include conservation of energy, Newton's laws, and wave-particle duality. Einstein's theories revolutionized our understanding of space, time, and gravity.", source: 'Nexus AI' };
                }
                return { text: "Physics explores how the universe works at all scales. From tiny atoms to massive stars, physics explains forces, motion, energy, and light. It's divided into classical physics (Newton), quantum mechanics (atoms), and relativity (space-time). Modern physics has given us everything from electricity to nuclear energy.", source: 'Nexus AI' };
            }
 
            // Chemistry
            if (/chemistry|chemical|reaction|element|periodic|molecule|compound/.test(lowerMessage)) {
                return { text: "Chemistry is the study of matter, reactions, and bonds. It explains how substances interact and transform. The periodic table organizes 118 elements by their properties. Chemical reactions create new compounds from elements. Chemistry bridges physics and biology, explaining everything from pharmaceuticals to materials science.", source: 'Nexus AI' };
            }
 
            // Biology & Life Science
            if (/biology|life|dna|genetics|evolution|cell|organism|species/.test(lowerMessage)) {
                return { text: "Biology is the science of life. It studies organisms, ecosystems, genetics, and evolution. DNA carries genetic information that determines our traits. Cells are the basic units of life. Evolution explains how species adapt and change over time. Modern biology includes molecular biology, genetics, ecology, and more.", source: 'Nexus AI' };
            }
 
            // Space & Astronomy
            if (/space|planet|star|astronomy|galaxy|universe|moon|astronaut|nasa/.test(lowerMessage)) {
                return { text: "Astronomy studies celestial objects and space. Our solar system has 8 planets orbiting the sun. Stars are massive burning balls of gas. Galaxies contain billions of stars. The universe is expanding, starting from the Big Bang. Space exploration has revealed black holes, exoplanets, and the cosmic microwave background radiation.", source: 'Nexus AI' };
            }
 
            // History
            if (/history|war|ancient|historical|century|civilization|empire|revolution/.test(lowerMessage)) {
                return { text: "History is humanity's story. Major periods include Ancient (Egypt, Rome, China), Medieval, Renaissance, Industrial Revolution, and Modern eras. Important events include wars, discoveries, and social movements. Understanding history helps us learn from past mistakes and appreciate cultural diversity. Studying causes and effects of historical events provides valuable context for today's world.", source: 'Nexus AI' };
            }
 
            // Geography & Environment
            if (/geography|earth|climate|weather|environment|ocean|mountain|continent/.test(lowerMessage)) {
                return { text: "Geography studies Earth's physical features and human societies. Physical geography includes mountains, oceans, climate, and ecosystems. Human geography covers cultures, economies, and politics. Climate science shows how greenhouse gases affect global temperatures. Environmental conservation is crucial for sustainable development.", source: 'Nexus AI' };
            }
 
            // Economics & Business
            if (/business|economy|money|finance|market|investment|stock|trade/.test(lowerMessage)) {
                return { text: "Economics and business involve production, distribution, and consumption of goods. Key concepts: supply and demand affect prices, markets enable trade, investments create wealth, and economies work through different systems (capitalism, socialism). Business requires understanding customers, competition, and financial management. Stock markets allow people to invest in companies.", source: 'Nexus AI' };
            }
 
            // Health & Medicine
            if (/health|medical|medicine|doctor|disease|treatment|vaccine|nutrition/.test(lowerMessage)) {
                return { text: "Health involves physical, mental, and emotional well-being. Good health requires exercise, balanced nutrition, sleep, stress management, and preventive care. Modern medicine uses drugs, surgery, and therapy to treat diseases. Public health focuses on disease prevention at population level. Mental health is equally important as physical health. Always consult healthcare professionals for medical advice.", source: 'Nexus AI' };
            }
 
            // Philosophy & Ethics
            if (/philosophy|ethics|morality|meaning|truth|consciousness|belief/.test(lowerMessage)) {
                return { text: "Philosophy explores fundamental questions about reality, knowledge, and ethics. Ancient philosophers like Socrates, Plato, and Aristotle laid foundations. Modern philosophy addresses consciousness, free will, and meaning. Ethics examines what's right and wrong. Epistemology questions how we know things. Metaphysics explores the nature of reality itself.", source: 'Nexus AI' };
            }
 
            // Arts & Literature
            if (/art|literature|music|creative|writing|poem|novel|painting|artist/.test(lowerMessage)) {
                return { text: "Arts and literature express human creativity and emotion. Literature includes novels, poetry, and plays that tell stories. Music creates emotion through sound. Visual arts like painting and sculpture convey ideas visually. Creative writing involves storytelling, character development, and imagery. These fields help us understand different perspectives and cultures.", source: 'Nexus AI' };
            }
 
            // Mathematics
            if (/math|mathematics|calculus|algebra|geometry|equation|number/.test(lowerMessage)) {
                return { text: "Mathematics is the language of the universe. Algebra deals with equations and variables. Geometry studies shapes and spaces. Calculus analyzes change and motion. Statistics helps interpret data. Number theory explores properties of integers. Math is essential for science, engineering, finance, and computer science. It develops logical thinking and problem-solving skills.", source: 'Nexus AI' };
            }
 
            // Psychology
            if (/psychology|mind|behavior|thinking|emotion|mental|brain|cognitive/.test(lowerMessage)) {
                return { text: "Psychology studies human behavior and mental processes. Cognitive psychology examines thinking and memory. Behavioral psychology focuses on observable actions. Social psychology studies group behavior. Clinical psychology treats mental health issues. Neuroscience reveals how the brain works. Understanding psychology helps with relationships, decision-making, and mental health.", source: 'Nexus AI' };
            }
 
            // AI & Machine Learning
            if (/ai|artificial intelligence|machine learning|neural|algorithm|data/.test(lowerMessage)) {
                return { text: "AI enables computers to perform tasks requiring intelligence. Machine learning lets systems learn from data without explicit programming. Neural networks mimic brain structures. Deep learning uses multiple layers for complex pattern recognition. Applications include image recognition, language processing, and recommendations. AI is transforming healthcare, finance, and technology.", source: 'Nexus AI' };
            }
 
            // Sports & Recreation
            if (/sport|game|exercise|fitness|team|competition|athletic/.test(lowerMessage)) {
                return { text: "Sports promote physical fitness, teamwork, and competition. Different sports develop different skills - strength, speed, endurance, strategy. Team sports teach collaboration. Individual sports build mental toughness. Regular exercise improves health physically and mentally. Sports also provide entertainment and cultural identity across the world.", source: 'Nexus AI' };
            }
 
            // Travel & Culture
            if (/travel|culture|country|city|journey|destination|tourist|cultural/.test(lowerMessage)) {
                return { text: "Travel exposes you to different cultures, cuisines, and perspectives. Each culture has unique traditions, languages, and values worth understanding. Traveling builds empathy and broadens worldview. Tourism supports local economies. Understanding different cultures promotes peace and cooperation. World heritage sites preserve human history.", source: 'Nexus AI' };
            }
 
            // General fallback
            return {
                text: "That's an interesting question! I'm analyzing what you're asking about. To give you the best answer, could you be more specific? For example, if it's about '" + userMessage.substring(0, 20) + "...', I'd love to know what aspect interests you most - the how, why, history, or something else?",
                source: 'Nexus AI'
            };
        }
 
        function addMessage(text, role, source = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'ai' ? '⚡' : '👤';
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let sourceHTML = '';
            if (source && role === 'ai') {
                sourceHTML = `<span class="source-badge">📍 ${source}</span>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    ${sourceHTML}
                    <div class="message-time">${timestamp}</div>
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
 
        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'typingIndicator';
            messageDiv.innerHTML = `
                <div class="message-avatar">⚡</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
 
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
 
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
 
        // Initial greeting
        console.log('Welcome to Nexus AI! This is a fully static website with no backend required.');
    </script>
</body>
