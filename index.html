<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Advanced Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Syne:wght@400;700&display=swap');

        :root {
            --primary: #0088ff;
            --primary-dark: #0066cc;
            --secondary: #00d9ff;
            --accent: #1a1f3a;
            --bg-dark: #0a0e1a;
            --bg-card: #0f1624;
            --bg-input: #151d2d;
            --text-primary: #ffffff;
            --text-secondary: #8899cc;
            --border-color: #1a2847;
            --success: #00d084;
            --blue-accent: #0055ff;
            --blue-light: #1e88ff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1728 50%, #1a1f2e 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 136, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(30, 136, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
            animation: gradientShift 8s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            background: rgba(15, 22, 36, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0088ff 0%, #1e88ff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.4);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #0088ff 0%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0, 136, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 136, 255, 0.3);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Welcome State */
        .welcome-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .welcome-icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .welcome-section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .welcome-section p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.6;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.4s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        }

        .message.user .message-avatar {
            background: rgba(0, 136, 255, 0.2);
            border: 1px solid rgba(0, 136, 255, 0.4);
        }

        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message.user .message-content {
            align-items: flex-end;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.ai .message-bubble {
            background: linear-gradient(135deg, rgba(0, 136, 255, 0.12) 0%, rgba(30, 136, 255, 0.08) 100%);
            border: 1px solid rgba(0, 136, 255, 0.25);
            color: var(--text-primary);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(0, 88, 255, 0.15) 0%, rgba(0, 136, 255, 0.1) 100%);
            border: 1px solid rgba(0, 136, 255, 0.3);
            color: var(--text-primary);
        }

        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* Input Area */
        .input-area {
            background: rgba(15, 22, 36, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            background: linear-gradient(135deg, #151d2d 0%, #1a2340 100%);
            border: 1px solid rgba(0, 136, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 12px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            transition: all 0.3s ease;
        }

        #messageInput:focus {
            outline: none;
            border-color: #0088ff;
            background: linear-gradient(135deg, #1a2340 0%, #1e2850 100%);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.25);
        }

        #messageInput::placeholder {
            color: var(--text-secondary);
        }

        .btn {
            background: linear-gradient(135deg, #0088ff 0%, #0055ff 100%);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 136, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .web-search-btn {
            background: linear-gradient(135deg, #1e88ff 0%, #0066cc 100%);
            color: white;
            padding: 10px 12px;
        }

        .web-search-btn:hover {
            box-shadow: 0 8px 24px rgba(30, 136, 255, 0.4);
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }

            h1 {
                font-size: 20px;
            }

            header {
                padding: 16px 20px;
            }

            .chat-container {
                padding: 20px;
            }

            .input-area {
                padding: 16px 20px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .source-badge {
            font-size: 11px;
            color: #00d9ff;
            background: rgba(0, 136, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <div class="logo">⚡</div>
                <h1>NEXUS AI</h1>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Always Updated</span>
            </div>
        </header>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-section">
                <div class="welcome-icon">🚀</div>
                <div>
                    <h2>Welcome to Nexus AI</h2>
                    <p>Your intelligent companion with real-time web search capabilities. Ask me anything and I'll provide current, accurate answers powered by the latest information available.</p>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="Ask me anything... I have access to the latest information online"
                    rows="1"
                ></textarea>
                <button class="btn web-search-btn" id="searchBtn" title="Search the web for current information">
                    🔍
                </button>
            </div>
            <button class="btn" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const searchBtn = document.getElementById('searchBtn');
        let useWebSearch = false;
        let conversationHistory = [];

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        // Handle Enter key (Shift+Enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        searchBtn.addEventListener('click', toggleWebSearch);

        function toggleWebSearch() {
            useWebSearch = !useWebSearch;
            searchBtn.style.opacity = useWebSearch ? '1' : '0.6';
            searchBtn.style.transform = useWebSearch ? 'scale(1.05)' : 'scale(1)';
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Remove welcome section on first message
            const welcomeSection = chatContainer.querySelector('.welcome-section');
            if (welcomeSection) welcomeSection.remove();

            // Add user message
            addMessage(message, 'user');
            conversationHistory.push({ role: 'user', content: message });

            // Show typing indicator
            showTypingIndicator();

            try {
                // Call the appropriate API
                let response;
                if (useWebSearch) {
                    response = await callGroqWithWebSearch(message);
                } else {
                    response = await callGroqAPI(message);
                }

                // Remove typing indicator
                removeTypingIndicator();

                // Add AI response
                addMessage(response.text, 'ai', response.source);
                conversationHistory.push({ role: 'assistant', content: response.text });

            } catch (error) {
                removeTypingIndicator();
                addMessage(`I encountered an error: ${error.message}. Please try again or add your own API keys for better results.`, 'ai');
            }
        }

        async function callGroqAPI(message) {
            // Note: For production use, add your Groq API key from https://console.groq.com
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getAPIKey('groq')}`
                },
                body: JSON.stringify({
                    model: 'mixtral-8x7b-32768',
                    messages: [
                        {
                            role: 'system',
                            content: 'You are Nexus AI, an intelligent and helpful assistant. Provide clear, accurate, and helpful responses. When you don\'t have current information, acknowledge it.'
                        },
                        ...conversationHistory.slice(-10).map(msg => ({
                            role: msg.role,
                            content: msg.content
                        }))
                    ],
                    temperature: 0.7,
                    max_tokens: 1500
                })
            });

            if (!response.ok) {
                throw new Error('API request failed. Please add your Groq API key.');
            }

            const data = await response.json();
            return {
                text: data.choices[0].message.content,
                source: 'Groq AI'
            };
        }

        async function callGroqWithWebSearch(message) {
            // This demonstrates web search integration concept
            // For actual implementation, you'd need:
            // 1. SerpAPI key (https://serpapi.com - has free tier)
            // 2. Groq API key (https://console.groq.com)
            
            try {
                // Search the web for current information
                const searchResults = await searchWeb(message);
                
                // Pass search results to Groq for context-aware response
                const contextualPrompt = `
Using the following current information from the web, answer the user's question:

Current Search Results:
${searchResults}

User Question: ${message}

Provide an accurate, well-sourced response based on the latest information available.
                `;

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getAPIKey('groq')}`
                    },
                    body: JSON.stringify({
                        model: 'mixtral-8x7b-32768',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are Nexus AI, an intelligent assistant with access to real-time web information. Provide current, accurate, and sourced responses. Always mention if information comes from web search.'
                            },
                            {
                                role: 'user',
                                content: contextualPrompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1500
                    })
                });

                if (!response.ok) {
                    throw new Error('Web search feature requires API keys');
                }

                const data = await response.json();
                return {
                    text: data.choices[0].message.content,
                    source: 'Web Search + Groq AI'
                };

            } catch (error) {
                throw new Error('Web search temporarily unavailable. Using standard mode.');
            }
        }

        async function searchWeb(query) {
            // This would use SerpAPI or similar service
            // Free tier: https://serpapi.com (100 searches/month free)
            const apiKey = getAPIKey('serpapi');
            
            if (!apiKey) {
                return 'Web search requires SerpAPI key. Visit https://serpapi.com to get a free key.';
            }

            try {
                const response = await fetch(
                    `https://serpapi.com/search?q=${encodeURIComponent(query)}&api_key=${apiKey}`
                );
                const data = await response.json();
                
                // Format search results
                const results = data.organic_results?.slice(0, 3)
                    .map(r => `- ${r.title}: ${r.snippet}`)
                    .join('\n') || 'No results found';
                
                return results;
            } catch (error) {
                return 'Unable to fetch web search results.';
            }
        }

        function getAPIKey(service) {
            // Retrieve from localStorage or prompt user
            let key = localStorage.getItem(`${service}_api_key`);
            
            if (!key) {
                const links = {
                    'groq': 'https://console.groq.com',
                    'serpapi': 'https://serpapi.com'
                };
                console.log(`Please add your ${service} API key. Get it from: ${links[service]}`);
            }
            
            return key || '';
        }

        function addMessage(text, role, source = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'ai' ? '⚡' : '👤';
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let sourceHTML = '';
            if (source && role === 'ai') {
                sourceHTML = `<span class="source-badge">📍 ${source}</span>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    ${sourceHTML}
                    <div class="message-time">${timestamp}</div>
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'typingIndicator';
            messageDiv.innerHTML = `
                <div class="message-avatar">⚡</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // API Key Management (simple implementation)
        window.setNexusAPIKey = function(service, key) {
            localStorage.setItem(`${service}_api_key`, key);
            console.log(`${service} API key saved successfully`);
        };

        window.getNexusAPIKey = function(service) {
            return localStorage.getItem(`${service}_api_key`);
        };

        console.log('Welcome to Nexus AI! To enable all features:');
        console.log('1. Get Groq API key: https://console.groq.com');
        console.log('2. Get SerpAPI key: https://serpapi.com');
        console.log('3. Run: setNexusAPIKey("groq", "your-key")');
        console.log('4. Run: setNexusAPIKey("serpapi", "your-key")');
    </script>
</body>
</html>
